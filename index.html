<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weierstrass Minimalfläche</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/three.module.js",
          "three/addons/": "./vendor/three/addons/"
        }
      }
    </script>
</head>

<body>
  <main class="app">
    <section class="viewer" aria-label="Minimalfläche">
      <canvas id="surface"></canvas>
      <button class="panel-toggle" id="panel-toggle" aria-label="Steuerung ein-/ausblenden">›</button>
      <div class="viewer-nav">
        <button id="rotation-toggle" class="viewer-nav-button viewer-nav-rotation" type="button" aria-pressed="false"
          title="Automatische Drehung starten" aria-label="Automatische Drehung starten">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path class="icon-play" d="M9 7.2v9.6l8-4.8z" fill="currentColor" />
            <path class="icon-pause" d="M8.3 7v10M15.7 7v10" fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" />
          </svg>
        </button>
        <button id="material-cycle" class="viewer-nav-button viewer-nav-material" type="button"
          title="Nächster Darstellungsmodus" aria-label="Nächster Darstellungsmodus">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="7.5" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path d="M7.8 8.4c1.7-1.9 4.3-2.4 6.4-1.2" fill="none" stroke="currentColor" stroke-width="1.4"
              stroke-linecap="round" />
          </svg>
        </button>
        <button id="background-cycle" class="viewer-nav-button viewer-nav-background" type="button"
          title="Nächster Hintergrund" aria-label="Nächster Hintergrund">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3.5" y="5" width="17" height="14" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6" />
            <circle cx="8.5" cy="10" r="1.6" fill="currentColor" />
            <path d="m4 16.5 4.7-4.7a1 1 0 0 1 1.4 0l3.4 3.4m2-2 1.5-1.5a1 1 0 0 1 1.4 0l1.6 1.6" fill="none"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <button id="surface-cycle" class="viewer-nav-button viewer-nav-surface" type="button" title="Nächste Fläche"
          aria-label="Nächste Fläche">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 8.5c2.4-3.2 4.9-3.2 7 0s4.6 3.2 7 0M3 15.5c2.4-3.2 4.9-3.2 7 0s4.6 3.2 7 0" fill="none"
              stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
          </svg>
        </button>
      </div>
      <div class="hud">
        <strong id="surface-name">Catenoid</strong>
        <span>Ziehen: Drehen</span>
        <span class="desktop-object-hint">Ctrl+Ziehen: Verschieben</span>
        <span class="desktop-zoom-hint">Mausrad: Zoom</span>
        <span class="touch-object-hint">Zwei Finger: Verschieben</span>
      </div>
    </section>
    <div id="panel-resizer" class="panel-resizer" role="separator" aria-label="Seitenbereich skalieren"
      aria-orientation="vertical" tabindex="0"></div>
    <aside class="panel">
      <h1>Weierstrass-Darstellung</h1>
      <p>
        <code>Re ∫ (f(1 - g²)/2, i f(1 + g²)/2, fg) dz</code>
      </p>
      <dl>
        <dt>Aktuelle Fläche</dt>
        <dt>g</dt>
        <dd><code id="formula-g"></code></dd>
        <dt>f</dt>
        <dd><code id="formula-f"></code></dd>
      </dl>
      <div class="material-mode-control" role="group" aria-label="Darstellungsmodus">
        <button id="material-previous" class="mode-step" type="button" aria-label="Vorheriger Darstellungsmodus">
          <span aria-hidden="true">&#9664;</span>
        </button>
        <output id="material-mode-label" class="material-mode-badge" aria-live="polite">Kupfer</output>
        <button id="material-next" class="mode-step" type="button" aria-label="Nächster Darstellungsmodus">
          <span aria-hidden="true">&#9654;</span>
        </button>
      </div>
      <div class="background-mode-control" role="group" aria-label="Hintergrund">
        <button id="background-previous" class="mode-step" type="button" aria-label="Vorheriger Hintergrund">
          <span aria-hidden="true">&#9664;</span>
        </button>
        <output id="background-mode-label" class="background-mode-badge" aria-live="polite">Weltraum</output>
        <button id="background-next" class="mode-step" type="button" aria-label="Nächster Hintergrund">
          <span aria-hidden="true">&#9654;</span>
        </button>
      </div>
      <div id="surface-buttons" class="surface-buttons" aria-label="Minimalflächen"></div>
      <section class="domain-controls" aria-label="Parameterbereich">
        <h2>Parameterbereich</h2>
        <div id="domain-info"></div>
        <div id="domain-slider-controls">
          <label>
            <span id="u-min-label">u min</span>
            <input id="u-min" type="range" step="0.01">
            <output id="u-min-value"></output>
          </label>
          <label>
            <span id="u-max-label">u max</span>
            <input id="u-max" type="range" step="0.01">
            <output id="u-max-value"></output>
          </label>
          <label>
            <span id="v-max-label">v max</span>
            <input id="v-max" type="range" step="0.01">
            <output id="v-max-value"></output>
          </label>
        </div>
        <button id="reset-domain" class="icon-button" type="button" title="Zurücksetzen" aria-label="Parameterbereich zurücksetzen">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 4v7h7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M4.5 16a8.5 8.5 0 1 0 1.8-13.2L3 11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </section>
      <section id="surface-parameters" class="surface-parameters" aria-label="Flächenparameter" hidden>
        <h2>Flächenparameter</h2>
        <div id="surface-parameter-controls"></div>
        <label id="hammer-factor-row" class="hammer-factor-row">
          <span>Dengelfaktor</span>
          <input id="hammer-factor" type="range" min="0" max="2" step="0.05">
          <output id="hammer-factor-value"></output>
        </label>
        <button id="reset-parameters" class="icon-button" type="button" title="Zurücksetzen" aria-label="Flächenparameter zurücksetzen">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 4v7h7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M4.5 16a8.5 8.5 0 1 0 1.8-13.2L3 11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </section>
      <button id="reset-view" type="button">Ansicht zurücksetzen</button>
      <button id="save-image" type="button">Bild speichern</button>
      <label id="video-resolution-row" class="video-resolution-row">
        <span>Videoauflösung</span>
        <select id="video-resolution">
          <option value="">Aktuelle Größe</option>
          <option value="1280">HD (1280 px)</option>
          <option value="1920" selected>Full HD (1920 px)</option>
          <option value="2560">WQHD (2560 px)</option>
          <option value="3840">4K (3840 px)</option>
        </select>
      </label>
      <button id="record-video" type="button" aria-pressed="false">Video aufnehmen</button>
    </aside>
  </main>
  <script type="module" src="main.js"></script>
</body>

</html>
